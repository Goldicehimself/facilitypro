<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Code</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f7fb; font-family: Arial, Helvetica, sans-serif; color: #0f172a; }
    .wrapper { width: 100%; padding: 24px 0; }
    .card { max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
    .header { background: #0f172a; color: #ffffff; padding: 24px; }
    .content { padding: 24px; }
    .code { font-size: 28px; font-weight: 700; letter-spacing: 6px; color: #1d4ed8; margin: 16px 0; }
    .footer { padding: 16px 24px 24px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <h2 style="margin:0; font-size: 20px;">FacilityPro Security Code</h2>
      </div>
      <div class="content">
        <p>Hello {{recipient_name}},</p>
        <p>Use the security code below to complete your sign-in.</p>
        <div class="code">{{security_code}}</div>
        <p>This code expires in {{expires_in}}.</p>
        <p>If you did not request this, please contact {{support_email}}.</p>
      </div>
      <div class="footer">
        <p>&copy; {{year}} FacilityPro. All rights reserved.</p>
      </div>
    </div>
  </div>
</body>
</html>
